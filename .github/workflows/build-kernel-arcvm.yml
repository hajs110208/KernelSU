name: Build Kernel - ChromeOS ARCVM
on:
  push:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    name: Build ChromeOS ARCVM kernel (x86_64, bzImage)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout KernelSU Source
        uses: actions/checkout@v4
        with:
          path: KernelSU

      - name: Set up build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates flex git gnupg \
            libelf-dev libssl-dev lsb-release software-properties-common \
            wget libncurses-dev binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            nuget gzip rsync python3 device-tree-compiler repo
            
      - name: Initialize Repo and Sync Source
        run: |
          mkdir kernel_workspace
          cd kernel_workspace
          # Syncing ChromeOS ARCVM 5.10 branch
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10-arcvm-gki-base --depth=1
          repo sync -c --no-clone-bundle --no-tags -j$(nproc)

      - name: Patch KernelSU into Source
        run: |
          cd kernel_workspace
          # Install the latest KernelSU via setup script
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Configure ARCVM kernel (x86_64)
        run: |
          cd kernel_workspace
          # Override the default GKI defconfig with the ARCVM defconfig
          sed -i "s/check_defconfig//" common/build.config.gki
          sed -i "s/DEFCONFIG=gki_defconfig/DEFCONFIG=x86_64_arcvm_defconfig/" common/build.config.gki
          cp common/arch/x86/configs/x86_64_arcvm_defconfig common/arch/x86/configs/x86_64_defconfig

      - name: Build Kernel (bzImage)
        run: |
          cd kernel_workspace
          # Compile the kernel
          # We add -Wno-error and -Wno-unused-function to prevent strict compiler flags from breaking the build
          LTO=thin CFLAGS='-Wno-error -Wno-unused-function' CXXFLAGS='-Wno-error -Wno-unused-function' BUILD_CONFIG=common/build.config.gki.x86_64 build/build.sh

      - name: Upload bzImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-ARCVM-x86_64-5.10-bzImage
          path: kernel_workspace/out/android12-5.10/dist/bzImage
          if-no-files-found: error
